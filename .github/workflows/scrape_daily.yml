name: Daily Credit Risk Scraper

on:
  schedule:
    # Run at 10:00 AM GMT-5 (15:00 UTC)
    # GMT-5 is UTC-5, so 10:00 GMT-5 = 15:00 UTC
    - cron: '0 15 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_full_scrape:
        description: 'Force full scrape (ignore date filter)'
        required: false
        default: 'false'
        type: string

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run scraper (last 48 hours only)
      run: |
        python main.py once
    
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update credit risk data $(date +'%Y-%m-%d') - Last 48h only"
        git push